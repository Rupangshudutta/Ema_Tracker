# fly.toml — Fly.io deployment config
# Free tier: 3 shared-cpu-1x 256MB VMs — enough for this bot
# Singapore region = Binance Futures API is NOT geo-blocked here

app = "ema-tracker-bot"
primary_region = "sin"

[build]
  # Uses the Dockerfile in the project root

[env]
  NODE_ENV = "production"
  EMA_PERIOD = "200"
  TIMEFRAME = "5m"
  VOLUME_THRESHOLD = "100000000"
  CHECK_INTERVAL = "300000"
  ALERT_COOLDOWN = "900000"
  # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are set via:
  #   fly secrets set TELEGRAM_BOT_TOKEN=xxx TELEGRAM_CHAT_ID=yyy

# Background worker — no HTTP port, no load balancer needed
[processes]
  app = "node main.js"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
